<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>米塔塔羅 × 大眾占卜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --rose: #e8c4c4;
    --rose-deep: #d4a0a0;
    --lavender: #d4c8e8;
    --lavender-deep: #b8a8d8;
    --lavender-light: #ede8f5;
    --mauve: #c4b0d0;
    --cream: #f9f4f0;
    --text-main: #7a6880;
    --text-soft: #a898b8;
    --card-bg: #ede8f5;
    --white-soft: rgba(255,255,255,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #f5eef8 0%, #ede4f0 30%, #e8dff0 60%, #f0e8ee 100%);
    font-family: 'Noto Serif TC', serif;
    color: var(--text-main);
    overflow-x: hidden;
    position: relative;
  }

  /* Floating particles canvas */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* Header card */
  .header-card {
    background: var(--white-soft);
    border-radius: 24px;
    padding: 20px 22px;
    margin-bottom: 18px;
    box-shadow: 0 8px 32px rgba(180,160,210,0.18);
    display: flex;
    align-items: center;
    gap: 16px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.7);
  }

  .logo-wrap {
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--lavender-light);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(180,160,210,0.25);
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--mauve);
    letter-spacing: 0.05em;
  }

  .brand-zh {
    font-size: 11px;
    color: var(--text-soft);
    letter-spacing: 0.15em;
  }

  .question-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-main);
    line-height: 1.5;
    margin-top: 4px;
  }

  /* Main card container */
  .main-card {
    background: var(--white-soft);
    border-radius: 28px;
    padding: 24px 20px;
    box-shadow: 0 12px 40px rgba(180,160,210,0.2);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.7);
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.8;
    margin-bottom: 22px;
    letter-spacing: 0.08em;
  }

  .subtitle span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--rose-deep);
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
    opacity: 0.6;
  }

  /* Tarot cards row */
  .cards-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 8px;
  }

  .tarot-card {
    flex: 1;
    max-width: 115px;
    background: linear-gradient(160deg, #ece5f7 0%, #e2d8f0 50%, #ddd0ed 100%);
    border-radius: 16px;
    padding: 18px 10px 14px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1.5px solid rgba(255,255,255,0.8);
    box-shadow: 0 4px 20px rgba(180,160,210,0.2), inset 0 1px 0 rgba(255,255,255,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .tarot-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
    border-radius: 16px 16px 0 0;
    pointer-events: none;
  }

  .tarot-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 12px 32px rgba(180,160,210,0.35);
  }

  .tarot-card:active {
    transform: translateY(-2px) scale(0.98);
  }

  .crystal-ball {
    font-size: 36px;
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(180,160,210,0.4));
    transition: transform 0.3s ease;
  }

  .tarot-card:hover .crystal-ball {
    transform: scale(1.1) rotate(-5deg);
  }

  .card-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
    letter-spacing: 0.2em;
    text-align: center;
  }

  .card-hint {
    font-size: 10px;
    color: var(--text-soft);
    letter-spacing: 0.1em;
    text-align: center;
  }

  .card-letter {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: var(--mauve);
    text-align: center;
    margin-top: -4px;
    letter-spacing: 0.15em;
  }

  /* Answer overlay */
  .answer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(220, 210, 235, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 20px 16px;
    overflow-y: auto;
    align-items: flex-start;
    justify-content: center;
  }

  .answer-overlay.active {
    display: flex;
  }

  .answer-card {
    background: linear-gradient(155deg, #fff9fe 0%, #f5eefa 40%, #ede5f5 100%);
    border-radius: 28px;
    padding: 28px 22px 32px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(160,130,200,0.25);
    border: 1px solid rgba(255,255,255,0.9);
    position: relative;
    margin: auto;
    animation: slideUp 0.5s cubic-bezier(0.34, 1.3, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .answer-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(200,180,230,0.3);
  }

  .answer-logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--lavender-light);
    flex-shrink: 0;
  }

  .answer-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .answer-option-badge {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--lavender-deep);
    font-weight: 400;
    line-height: 1;
  }

  .answer-option-label {
    font-size: 12px;
    color: var(--text-soft);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .answer-body {
    font-size: 14.5px;
    line-height: 2;
    color: var(--text-main);
    letter-spacing: 0.04em;
    margin-bottom: 22px;
    white-space: pre-line;
  }

  .magic-product {
    background: linear-gradient(135deg, rgba(232,196,196,0.3) 0%, rgba(212,192,232,0.3) 100%);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 16px;
    border: 1px solid rgba(200,180,220,0.3);
  }

  .magic-product-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--mauve);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .magic-product-desc {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.8;
    letter-spacing: 0.03em;
  }

  .divider {
    text-align: center;
    color: var(--rose-deep);
    opacity: 0.5;
    font-size: 18px;
    letter-spacing: 6px;
    margin: 18px 0;
  }

  .cta-block {
    background: linear-gradient(135deg, rgba(212,192,232,0.35) 0%, rgba(232,196,196,0.25) 100%);
    border-radius: 18px;
    padding: 18px;
    text-align: center;
    border: 1px solid rgba(200,180,220,0.3);
    margin-bottom: 18px;
  }

  .cta-text {
    font-size: 13.5px;
    color: var(--text-main);
    line-height: 1.9;
    letter-spacing: 0.03em;
    margin-bottom: 14px;
  }

  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--lavender-deep), var(--rose-deep));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 14px;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(180,150,210,0.35);
    transition: all 0.3s ease;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(180,150,210,0.45);
  }

  .close-btn {
    display: block;
    width: 100%;
    background: rgba(200,180,230,0.2);
    border: 1.5px solid rgba(200,180,230,0.4);
    border-radius: 50px;
    padding: 12px;
    font-size: 13px;
    font-family: 'Noto Serif TC', serif;
    color: var(--text-soft);
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.3s ease;
  }

  .close-btn:hover {
    background: rgba(200,180,230,0.35);
    color: var(--text-main);
  }

  /* Sparkle decoration */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 12px;
    opacity: 0.5;
    animation: twinkle 3s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.3); }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="page-wrapper">

  <!-- Header -->
  <div class="header-card">
    <div class="logo-wrap">
      <img src="/mnt/user-data/uploads/IMG_8804.jpeg" alt="米塔塔羅 Logo">
    </div>
    <div class="header-text">
      <div class="brand-name">· mita tarot ·</div>
      <div class="brand-zh">米 塔 塔 羅</div>
      <div class="question-title">測他現在最在意你什麼？</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-card">
    <div class="subtitle">
      靜下心來，感受直覺的引導<span></span>選擇最吸引你的那一張牌
    </div>

    <div class="cards-row">
      <div class="tarot-card" onclick="showAnswer('A')">
        <div class="crystal-ball">🔮</div>
        <div class="card-label">選 項 A</div>
        <div class="card-hint">點我翻牌</div>
        <div class="card-letter">Option A</div>
      </div>
      <div class="tarot-card" onclick="showAnswer('B')">
        <div class="crystal-ball">🔮</div>
        <div class="card-label">選 項 B</div>
        <div class="card-hint">點我翻牌</div>
        <div class="card-letter">Option B</div>
      </div>
      <div class="tarot-card" onclick="showAnswer('C')">
        <div class="crystal-ball">🔮</div>
        <div class="card-label">選 項 C</div>
        <div class="card-hint">點我翻牌</div>
        <div class="card-letter">Option C</div>
      </div>
    </div>
  </div>

</div>

<!-- Answer Overlay -->
<div class="answer-overlay" id="answerOverlay">
  <div class="answer-card">
    <div class="sparkle" style="top:14px;right:22px;animation-delay:0s">✦</div>
    <div class="sparkle" style="top:50px;right:14px;animation-delay:1s">✧</div>
    <div class="sparkle" style="bottom:60px;left:16px;animation-delay:2s">✦</div>

    <div class="answer-header">
      <div class="answer-logo">
        <img src="/mnt/user-data/uploads/IMG_8804.jpeg" alt="Logo">
      </div>
      <div>
        <div class="answer-option-badge" id="answerBadge">A</div>
        <div class="answer-option-label">選項結果</div>
      </div>
    </div>

    <div class="answer-body" id="answerBody"></div>
    <div class="magic-product" id="magicProduct"></div>

    <div class="divider">· · ·</div>

    <div class="cta-block">
      <div class="cta-text">💜 想知道你們目前的感情課題、對方真實想法與未來發展方向，也可以預約個人占卜深入解析🫶🏻</div>
      <a class="cta-btn" href="https://lin.ee/tfDEdH8" target="_blank">✨ 預約個人占卜</a>
    </div>

    <button class="close-btn" onclick="closeAnswer()">← 重新選擇</button>
  </div>
</div>

<script>
const answers = {
  A: {
    body: `他最在意的是你帶給他的熟悉感與安心感。

即使彼此有段時間沒那麼靠近，你在他心中依然有特殊的位置。近期他也可能重新燃起想主動靠近或聯繫你的念頭，但同時會考量現實層面與未來發展，因此顯得比較謹慎。`,
    product: `✨ 推薦魔法商品：初心`,
    productDesc: `幫助喚醒美好回憶與情感連結，讓關係重新找到最初的溫度。`
  },
  B: {
    body: `他最在意的是自己是否真的看懂你的想法。

這段時間他心裡其實有不少疑問與猜測，對你的情緒、態度或身邊的人特別敏感。有些事情他原本看不清楚，但近期似乎慢慢察覺到一些真相，因此特別關注你的一舉一動。`,
    product: `✨ 推薦魔法商品：澄光`,
    productDesc: `協助清理混亂能量與內在疑慮，讓關係中的訊息更清晰流動。`
  },
  C: {
    body: `他最在意的是你們之間未來還有沒有機會。

雖然目前存在距離感、誤會或價值觀差異，但他其實沒有完全放下這段關係。內心仍在觀察局勢變化，想知道未來是否還有重新靠近或改變現況的可能。`,
    product: `✨ 推薦魔法商品：心動`,
    productDesc: `幫助提升感情能量流動，增加彼此互動與關係推進的機會。`
  }
};

function showAnswer(opt) {
  const data = answers[opt];
  document.getElementById('answerBadge').textContent = opt;
  document.getElementById('answerBody').textContent = data.body;
  document.getElementById('magicProduct').innerHTML = `
    <div class="magic-product-title">${data.product}</div>
    <div class="magic-product-desc">${data.productDesc}</div>
  `;
  const overlay = document.getElementById('answerOverlay');
  overlay.classList.add('active');
  overlay.scrollTop = 0;
}

function closeAnswer() {
  document.getElementById('answerOverlay').classList.remove('active');
}

// Particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const symbols = ['♡', '✦', '✧', '·', '⋆', '✿'];
const colors = ['rgba(212,160,160,', 'rgba(180,160,210,', 'rgba(200,180,220,', 'rgba(220,200,240,'];

for (let i = 0; i < 45; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.35,
    vy: -Math.random() * 0.5 - 0.2,
    size: Math.random() * 10 + 7,
    sym: symbols[Math.floor(Math.random() * symbols.length)],
    color: colors[Math.floor(Math.random() * colors.length)],
    alpha: Math.random() * 0.3 + 0.1,
    alphaDir: (Math.random() - 0.5) * 0.006
  });
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.alpha += p.alphaDir;
    if (p.alpha > 0.4 || p.alpha < 0.05) p.alphaDir *= -1;
    if (p.y < -20) { p.y = H + 10; p.x = Math.random() * W; }
    if (p.x < -20) p.x = W + 10;
    if (p.x > W + 20) p.x = -10;
    ctx.font = `${p.size}px serif`;
    ctx.fillStyle = p.color + p.alpha + ')';
    ctx.fillText(p.sym, p.x, p.y);
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
