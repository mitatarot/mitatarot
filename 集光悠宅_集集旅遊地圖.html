const tagMap={nature:"tag-nature",culture:"tag-culture",kids:"tag-kids",food:"tag-food",art:"tag-art"};
const tagText={nature:"🌿 自然",culture:"🏛️ 文化",kids:"👶 親子",food:"🍜 美食",art:"🎨 藝術"};
const distClass={local:"dist-local",nearby20:"dist-20",nearby30:"dist-30"};
const distLabel={local:"集集本地",nearby20:"約20分車程",nearby30:"約30分車程"};
const sectionTagClass={local:"local",nearby20:"nearby20",nearby30:"nearby30"};

function generateQR(url, canvasId){
  const el=document.getElementById(canvasId);
  if(!el)return;
  QRCode.toCanvas(el,url,{width:64,margin:1,color:{dark:'#3d5c36',light:'#ffffff'}},function(err){
    if(err)console.warn(err);
  });
}

function renderCards(filter){
  const main=document.getElementById('main-content');
  main.innerHTML='';
  const groups={local:[],nearby20:[],nearby30:[]};
  spots.forEach(s=>{
    const match=filter==='all'
      ||(filter==='local'&&s.dist==='local')
      ||(filter==='nearby20'&&s.dist==='nearby20')
      ||(filter==='nearby30'&&s.dist==='nearby30')
      ||(filter==='kids'&&s.tags.includes('kids'))
      ||(filter==='nature'&&s.tags.includes('nature'))
      ||(filter==='culture'&&s.tags.includes('culture'));
    if(match) groups[s.dist].push(s);
  });

  let total=0;
  ['local','nearby20','nearby30'].forEach(distKey=>{
    const arr=groups[distKey];
    if(!arr.length)return;
    total+=arr.length;

    // Section header
    const sh=document.createElement('div');
    sh.className='section-header';
    sh.innerHTML=`<span class="section-tag ${sectionTagClass[distKey]}">${distLabel[distKey]}</span><div class="section-line"></div><span class="section-count">${arr.length} 個景點</span>`;
    main.appendChild(sh);

    // Grid
    const grid=document.createElement('div');
    grid.className='cards-grid';
    arr.forEach(s=>{
      const card=document.createElement('div');
      card.className='spot-card';
      const qrId=`qr-${s.id}`;
      card.innerHTML=`
        <div class="card-img-wrap">
          <img src="${s.photo}" alt="${s.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-img-placeholder" style="display:none">${s.emoji}</div>
          <span class="card-dist-badge ${distClass[s.dist]}">${distLabel[s.dist]}</span>
          <span class="card-rating">⭐ ${s.rating}</span>
        </div>
        <div class="card-body">
          <div class="card-top">
            <span class="card-name">${s.name}</span>
            <span class="card-time">⏱ ${s.time}</span>
          </div>
          <div class="card-tags">${s.tags.map((t,i)=>`<span class="tag ${tagMap[t]}">${tagText[t]} ${s.tagLabels[i]||''}</span>`).join('')}</div>
          <p class="card-desc">${s.desc}</p>
          <div class="card-footer-row">
            <span class="card-crowd">👥 ${s.crowd}</span>
            <span class="card-expand-btn">詳情 <span class="card-expand-icon">▼</span></span>
          </div>
        </div>
        <div class="card-details">
          <div class="tip-block">
            <div class="tip-block-label">✦ 集光悠宅推薦</div>
            <p>${s.tip}</p>
          </div>
          <div class="map-qr-row">
            <a class="map-link-btn" href="${s.mapUrl}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              Google Maps 導航
            </a>
            <div class="addr-text">${s.addr}</div>
            <div class="qr-wrap"><canvas id="${qrId}"></canvas></div>
          </div>
        </div>
      `;

      // Toggle expand
      const expandBtn=card.querySelector('.card-expand-btn');
      const imgWrap=card.querySelector('.card-img-wrap');
      function toggleCard(){
        const wasExpanded=card.classList.contains('expanded');
        card.classList.toggle('expanded');
        if(!wasExpanded){
          setTimeout(()=>generateQR(s.mapUrl,qrId),50);
        }
      }
      expandBtn.addEventListener('click',e=>{e.stopPropagation();toggleCard()});
      imgWrap.addEventListener('click',toggleCard);

      grid.appendChild(card);
    });
    main.appendChild(grid);
  });

  if(!total){
    main.innerHTML='<div class="empty-state">找不到符合條件的景點</div>';
  }
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});

renderCards('all');
