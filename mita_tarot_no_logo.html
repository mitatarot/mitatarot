.hint-row { font-size:12px; color:#5548a0; margin-bottom:0.5rem; position:relative; z-index:1; }
.reselect-btn { display:none; margin:0 auto 0.65rem; background:rgba(255,255,255,0.5); border:1.5px solid rgba(160,130,220,0.5); color:#5548a0; font-size:12px; padding:5px 18px; border-radius:20px; cursor:pointer; transition:background 0.18s; position:relative; z-index:1; }

.reselect-btn.show { display:inline-block; }

.res-badge { display:inline-block; font-size:11px; font-weight:500; color:#6040a8; background:rgba(180,150,255,0.2); border:1px solid rgba(160,130,220,0.35); border-radius:10px; padding:2px 10px; letter-spacing:0.05em; margin-bottom:7px; }

.btn-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.line-btn { display:inline-block; background:linear-gradient(120deg,#4838a8,#a030c0); color:#fff; font-size:13px; font-weight:500; padding:8px 20px; border-radius:22px; text-decoration:none; }
.again-btn { background:rgba(255,255,255,0.6); border:1.5px solid rgba(160,140,240,0.5); color:#5548a0; font-size:12px; padding:7px 14px; border-radius:22px; cursor:pointer; }
.again-btn:hover { background:rgba(200,180,255,0.25); }
</style>

<script>
function shell(ctx, cx, cy, size, col, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = col;
  ctx.lineWidth = 0.9;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.ellipse(cx, cy + size*0.1, size*0.55, size*0.7, 0, 0, Math.PI*2);
  ctx.globalAlpha = alpha * 0.18;
  ctx.fill();
  ctx.globalAlpha = alpha * 0.7;
  ctx.stroke();
  const ribs = 7;
  for (let i = 0; i < ribs; i++) {
    const t = (i / (ribs - 1)) * Math.PI - Math.PI/2;
    const ex = cx + Math.cos(t) * size * 0.55;
    const ey = cy + size*0.1 + Math.sin(t) * size * 0.7;
    ctx.globalAlpha = alpha * 0.4;
    ctx.beginPath();
    ctx.moveTo(cx, cy - size * 0.5);
    ctx.quadraticCurveTo(cx + Math.cos(t)*size*0.3, cy + Math.sin(t)*size*0.2, ex, ey);
    ctx.stroke();
  }
  ctx.globalAlpha = alpha * 0.9;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(cx, cy - size * 0.5, size * 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function dot(ctx, cx, cy, r, col, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill(); ctx.restore();
}
function drawBack(id) {
  const cv = document.getElementById(id);
  const ctx = cv.getContext('2d');
  const w = cv.width, h = cv.height;
  shell(ctx, w/2, h/2+2, 20, '#c8b8ff', 0.95);
  shell(ctx, 10, 10, 8, '#a0b8ff', 0.65);
  shell(ctx, w-10, h-10, 7, '#e0b8ff', 0.6);
  shell(ctx, w-8, 12, 6, '#ffc8f0', 0.55);
  shell(ctx, 8, h-10, 6, '#b8d0ff', 0.5);
  dot(ctx, w/2+14, 8, 1.5, '#ffffff', 0.6);
  dot(ctx, 4, h/2, 1.5, '#d8c8ff', 0.5);
  dot(ctx, w-4, h/2-4, 1.2, '#b8d8ff', 0.45);
  dot(ctx, w/2-16, h-4, 1.2, '#ffd8f8', 0.45);
}
function drawFront(id) {
  const cv = document.getElementById(id);
  const ctx = cv.getContext('2d');
  shell(ctx, 15, 15, 11, '#9888e8', 0.8);
}
['A','B','C'].forEach(k => { drawBack('cv'+k); drawFront('fcv'+k); });

const DATA = {
  A: { card:'聖杯 3', title:'社交順流，分享讓事情更順', body:'明天很適合社交與互動的一天。可能會有朋友邀約、聊天變多，或是心情變得比較輕鬆愉快。\n\n這張牌也代表「連結感」，有些事情透過交流反而更順，不一定要自己撐著，適度分享會有幫助。', tip:'可以試著見朋友、聊天、放鬆一下 🌸' },
  B: { card:'金星能量', title:'滋養自己，放鬆就是吸引力', body:'明天的能量偏向「滋養與享受」。你會比較在意自己的感受，也適合讓自己過得舒服一點。\n\n不論是打扮、吃點好吃的，或是做讓自己開心的事，都會讓整體狀態變更好。當你放鬆、自然，就會更容易吸引到好的回應。', tip:'可以多照顧自己、放慢步調 ✨' },
  C: { card:'五角星 / 錢幣', title:'穩穩累積，慢才是真的快', body:'明天是穩定務實的一天。事情不一定很快有結果，但你正在慢慢累積。\n\n適合按部就班把該做的事情做好，雖然節奏偏慢，但其實是在往正確方向前進。', tip:'不要急，穩穩來反而更有成果 🌙' }
};

let done = false;
function pick(k) {
  if (done) return; done = true;
  document.getElementById('c'+k).classList.add('flipped');
  ['A','B','C'].forEach(x => {
    document.getElementById('c'+x).classList.add('done');
    if (x !== k) document.getElementById('c'+x).classList.add('faded');
  });
  document.getElementById('hintTxt').textContent = '牌面揭曉 ✨';
  document.getElementById('reselBtn').classList.add('show');
  setTimeout(() => showResult(k), 720);
}
function showResult(k) {
  const d = DATA[k];
  const paras = d.body.split('\n\n').map(p => '<p>'+p+'</p>').join('');
  const el = document.getElementById('resultArea');
  el.innerHTML =
    '<div class="res-badge">你選了 '+k+' 牌</div>'+
    '<div class="res-card-name">✦ '+d.card+'</div>'+
    '<div class="res-title">'+d.title+'</div>'+
    '<div class="res-body">'+paras+'</div>'+
    '<div class="res-tip">Mita 小建議：'+d.tip+'</div>'+
    '<div class="res-cta">如果你最近有點卡住，或是想更清楚某段關係、某個選擇，可以找 Mita 聊聊 🐰</div>'+
    '<div class="btn-row"><a class="line-btn" href="https://lin.ee/7A6HCQo" target="_blank">找 Mita 聊聊</a><button class="again-btn" onclick="doResel()">再抽一次</button></div>';
  el.classList.add('show');
}
function doResel() {
  done = false;
  ['A','B','C'].forEach(k => { const c=document.getElementById('c'+k); c.classList.remove('flipped','faded','done'); });
  document.getElementById('reselBtn').classList.remove('show');
  const ra = document.getElementById('resultArea');
  ra.classList.remove('show'); ra.innerHTML = '';
  document.getElementById('hintTxt').textContent = '輕觸一張牌，揭開明日的訊息 ✨';
}
</script>
