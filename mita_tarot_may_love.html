
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .tarot-wrap {
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1854 40%, #1a2744 100%);
    min-height: 100vh;
    padding: 2.5rem 1.5rem 3rem;
    font-family: 'Noto Serif TC', serif;
    position: relative;
    overflow: hidden;
  }

  .stars {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .header {
    text-align: center;
    position: relative; z-index: 1;
    margin-bottom: 2rem;
  }

  .brand {
    font-size: 12px;
    letter-spacing: 3px;
    color: #c9b8e8;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .title-main {
    font-size: 22px;
    color: #f0e6ff;
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 13px;
    color: #a89cc8;
    letter-spacing: 1px;
  }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #b48ee8, transparent);
    margin: 1rem auto;
  }

  .prompt-text {
    text-align: center;
    color: #d4c6f0;
    font-size: 14px;
    margin-bottom: 2rem;
    position: relative; z-index: 1;
    line-height: 1.8;
  }

  .cards-row {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    position: relative; z-index: 1;
    margin-bottom: 2rem;
  }

  .card-btn {
    background: linear-gradient(160deg, #2d1a5e 0%, #1e2a5e 100%);
    border: 1px solid rgba(180, 142, 232, 0.4);
    border-radius: 16px;
    width: 150px;
    padding: 1.5rem 1rem 1.2rem;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card-btn:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: rgba(180, 142, 232, 0.9);
    box-shadow: 0 12px 40px rgba(140, 80, 220, 0.4);
  }

  .card-btn::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(180,142,232,0.12), transparent 70%);
    pointer-events: none;
  }

  .card-glyph {
    font-size: 36px;
    margin-bottom: 0.7rem;
    display: block;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #b48ee8;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
  }

  .card-name {
    font-size: 15px;
    color: #f0e6ff;
    font-weight: 500;
    line-height: 1.4;
  }

  .card-sub {
    font-size: 11px;
    color: #8a7aaa;
    margin-top: 0.3rem;
  }

  /* Result panel */
  .result-panel {
    display: none;
    position: relative; z-index: 1;
    background: rgba(30, 15, 60, 0.85);
    border: 1px solid rgba(180, 142, 232, 0.35);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    max-width: 560px;
    margin: 0 auto;
    backdrop-filter: blur(8px);
  }

  .result-panel.visible { display: block; animation: fadeUp 0.6s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .result-glyph { font-size: 48px; display: block; margin-bottom: 0.5rem; }

  .result-card-name {
    font-size: 20px;
    color: #f0e6ff;
    font-weight: 500;
    margin-bottom: 0.2rem;
  }

  .result-option {
    font-size: 11px;
    letter-spacing: 2px;
    color: #b48ee8;
    text-transform: uppercase;
  }

  .divider-sm {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, #b48ee8, transparent);
    margin: 1rem auto;
  }

  .section-tag {
    display: inline-block;
    background: rgba(100, 60, 180, 0.35);
    border: 1px solid rgba(180, 142, 232, 0.4);
    border-radius: 20px;
    padding: 3px 14px;
    font-size: 11px;
    color: #c9b0ee;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }

  .section-block {
    margin-bottom: 1.4rem;
  }

  .section-text {
    font-size: 14px;
    color: #d4c6f0;
    line-height: 1.9;
  }

  .suggest-box {
    background: rgba(100, 60, 180, 0.2);
    border: 1px solid rgba(180, 142, 232, 0.3);
    border-radius: 12px;
    padding: 0.9rem 1.1rem;
    margin-top: 0.5rem;
  }

  .suggest-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #b48ee8;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .suggest-text {
    font-size: 13px;
    color: #c4b5e0;
    line-height: 1.7;
  }

  .cta-block {
    margin-top: 2rem;
    text-align: center;
    background: rgba(180, 142, 232, 0.1);
    border: 1px solid rgba(180, 142, 232, 0.25);
    border-radius: 14px;
    padding: 1.2rem;
  }

  .cta-text {
    font-size: 13px;
    color: #c4b5e0;
    line-height: 1.8;
    margin-bottom: 1rem;
  }

  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #7c3aed, #4f6bc4);
    color: #f0e6ff;
    font-size: 14px;
    font-family: 'Noto Serif TC', serif;
    padding: 0.7rem 1.8rem;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }

  .cta-btn:hover { opacity: 0.85; }

  .reset-btn {
    display: block;
    margin: 1.5rem auto 0;
    background: transparent;
    border: 1px solid rgba(180,142,232,0.3);
    color: #9a89c0;
    font-size: 12px;
    font-family: 'Noto Serif TC', serif;
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }

  .reset-btn:hover { border-color: rgba(180,142,232,0.7); color: #c4b5e0; }
</style>

<div class="tarot-wrap">
  <svg class="stars" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="40" r="1" fill="rgba(200,180,255,0.6)"/>
    <circle cx="200" cy="20" r="1.5" fill="rgba(200,180,255,0.5)"/>
    <circle cx="400" cy="55" r="1" fill="rgba(200,180,255,0.7)"/>
    <circle cx="560" cy="30" r="1" fill="rgba(200,180,255,0.4)"/>
    <circle cx="620" cy="80" r="1.5" fill="rgba(200,180,255,0.5)"/>
    <circle cx="100" cy="120" r="1" fill="rgba(200,180,255,0.4)"/>
    <circle cx="320" cy="100" r="1" fill="rgba(200,180,255,0.6)"/>
    <circle cx="500" cy="130" r="1.5" fill="rgba(200,180,255,0.3)"/>
    <circle cx="650" cy="160" r="1" fill="rgba(200,180,255,0.5)"/>
  </svg>

  <div class="header">
    <div class="brand">MITA TAROT ✦ 米塔塔羅</div>
    <div class="title-main">5月 戀愛運勢占卜</div>
    <div class="divider"></div>
    <div class="subtitle">選擇一張牌，揭示你的愛情能量</div>
  </div>

  <div class="prompt-text">
    靜下心來，感受直覺的引導<br>選擇最吸引你的那一張牌
  </div>

  <div class="cards-row" id="cardsRow">
    <button class="card-btn" onclick="showResult('A')">
      <span class="card-glyph">☀️</span>
      <div class="card-label">選項 A</div>
      <div class="card-name">太陽</div>
      <div class="card-sub">The Sun</div>
    </button>
    <button class="card-btn" onclick="showResult('B')">
      <span class="card-glyph">🌙</span>
      <div class="card-label">選項 B</div>
      <div class="card-name">星幣九 逆位</div>
      <div class="card-sub">Nine of Pentacles ↓</div>
    </button>
    <button class="card-btn" onclick="showResult('C')">
      <span class="card-glyph">🦁</span>
      <div class="card-label">選項 C</div>
      <div class="card-name">力量</div>
      <div class="card-sub">Strength</div>
    </button>
  </div>

  <div class="result-panel" id="resultPanel"></div>
</div>

<script>
const data = {
  A: {
    glyph: '☀️',
    name: '太陽',
    option: '選項 A',
    sections: [
      {
        tag: '單身',
        text: '5月的你偏內斂與觀察型，其實身邊不是沒有機會，但你會先看、先感受，不會急著投入。容易出現一種情況：彼此有感覺，但沒有說破。\n這個月的關鍵不在「有沒有桃花」，而在於你願不願意讓關係往前一步。',
        icon: '🌸'
      },
      {
        tag: '交往中',
        text: '這段關係來到一個壓力累積的點，可能過去的問題沒有真正被解決，導致情緒在5月容易爆發。\n這張牌不只是結束，也代表看清。有些人會選擇放下，有些人會選擇重新調整相處方式。\n重點在於，不適合再用過去的方式經營這段關係。',
        icon: '⚔️'
      },
      {
        tag: '復合',
        text: '這組的能量偏向一個階段的完成。比起回頭，更像是走完一段課題之後的釋懷。即使有聯繫，也比較像是以新的心態看待彼此，而不是回到從前的關係。',
        icon: '🌍'
      },
      {
        tag: '建議搭配',
        suggest: true,
        card: '澄光',
        text: '適合用來整理情緒與關係狀態，幫助自己看清方向，特別是在需要放下或做決定的時候。'
      }
    ]
  },
  B: {
    glyph: '🌙',
    name: '星幣九 逆位',
    option: '選項 B',
    sections: [
      {
        tag: '單身',
        text: '5月的桃花帶有不確定性，容易遇到會說話、懂互動的人，但動機未必單純。也有可能是你自己還沒有準備好進入關係，導致互動停在曖昧或試探。\n這個月需要多一點觀察，而不是太快投入。',
        icon: '🎭'
      },
      {
        tag: '交往中',
        text: '關係整體是舒服的，有陪伴、有滿足感。但也容易停在一種「這樣就好」的狀態，缺乏往下一步的推進。\n如果有期待更穩定或更深入的發展，需要有人先開口或主動規劃。',
        icon: '🌊'
      },
      {
        tag: '復合',
        text: '復合的可能性存在，但前提是雙方願意面對問題。這不是靠情緒牽引的復合，而是理性評估之後的選擇。如果過去的問題沒有被處理，關係很難真正重新開始。',
        icon: '⚖️'
      },
      {
        tag: '建議搭配',
        suggest: true,
        card: '心動',
        text: '幫助提升吸引力，同時也能更清楚分辨對方的真實意圖，避免陷入不穩定的關係。'
      }
    ]
  },
  C: {
    glyph: '🦁',
    name: '力量',
    option: '選項 C',
    sections: [
      {
        tag: '單身',
        text: '你的狀態是有吸引力的，也容易讓人產生好感。5月的桃花偏向溫和、願意關心你的類型。但你同時也會有自己的標準，不會隨便投入。',
        icon: '👑'
      },
      {
        tag: '交往中',
        text: '這段關係在穩定經營中，雙方都有在付出與努力。雖然不是特別強烈的激情，但是可以慢慢累積的關係。適合一起規劃未來或建立更穩定的生活模式。',
        icon: '💎'
      },
      {
        tag: '復合',
        text: '有機會重新建立連結，但重點在於「平衡」。如果只是單方面付出，這段關係仍然不會長久。只有在雙方願意互相給予的情況下，才有機會穩定發展。',
        icon: '🌿'
      },
      {
        tag: '建議搭配',
        suggest: true,
        card: '錢錢到',
        text: '幫助穩定整體能量流動，讓感情與現實層面同步提升，特別適合想要關係穩定成長的人。'
      }
    ]
  }
};

function showResult(key) {
  const d = data[key];
  const panel = document.getElementById('resultPanel');
  const row = document.getElementById('cardsRow');

  let html = `
    <div class="result-header">
      <span class="result-glyph">${d.glyph}</span>
      <div class="result-option">${d.option}</div>
      <div class="result-card-name">${d.name}</div>
    </div>
    <div class="divider-sm"></div>
  `;

  d.sections.forEach(s => {
    if (s.suggest) {
      html += `
        <div class="section-block">
          <div class="suggest-box">
            <div class="suggest-label">✦ ${s.tag} ｜${s.card}</div>
            <div class="suggest-text">${s.text}</div>
          </div>
        </div>
      `;
    } else {
      html += `
        <div class="section-block">
          <span class="section-tag">${s.icon} ${s.tag}</span>
          <div class="section-text">${s.text.replace(/\n/g, '<br>')}</div>
        </div>
      `;
    }
  });

  html += `
    <div class="cta-block">
      <div class="cta-text">
        如果你想更深入了解自己的狀況<br>
        例如對方的想法、關係發展或時間點<br>
        可以私訊做個人占卜 ✨
      </div>
      <a class="cta-btn" href="https://lin.ee/pPNZURN" target="_blank">預約官方 LINE</a>
    </div>
    <button class="reset-btn" onclick="resetCards()">← 重新選擇</button>
  `;

  panel.innerHTML = html;
  panel.classList.add('visible');
  row.style.display = 'none';
  document.querySelector('.prompt-text').style.display = 'none';
}

function resetCards() {
  const panel = document.getElementById('resultPanel');
  const row = document.getElementById('cardsRow');
  panel.classList.remove('visible');
  panel.innerHTML = '';
  row.style.display = 'flex';
  document.querySelector('.prompt-text').style.display = 'block';
}
</script>
