
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.fw {
  padding: 2.2rem 1rem 2.5rem;
  text-align: center;
  font-family: var(--font-sans);
  background: linear-gradient(160deg, #f3e8ff 0%, #fce4f0 35%, #ffe8f4 60%, #e8e4ff 100%);
  border-radius: 24px;
}
.ftitle { font-size: 15px; font-weight: 500; color: #4a3fa0; margin-bottom: 4px; letter-spacing: 0.05em; }
.fsub { font-size: 12px; color: #c2527a; margin-bottom: 1.6rem; }
.deco { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:1.6rem; }
.deco hr { width:28px; border:none; border-top:1px solid #d8b4e2; }
.deco-gem { width:7px; height:7px; background:#e08bb5; border-radius:2px; transform:rotate(45deg); }

.cards-row { display:flex; justify-content:center; gap:22px; margin-bottom:1.6rem; }
.card-wrap { position:relative; width:106px; height:166px; perspective:700px; cursor:pointer; }
.card-inner { width:100%; height:100%; transform-style:preserve-3d; transition:transform 0.65s cubic-bezier(.4,.2,.2,1); }
.card-wrap:hover:not(.done) .card-inner { transform: translateY(-8px) scale(1.03); }
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }
.card-wrap.faded { opacity:0.22; pointer-events:none; transition:opacity 0.45s; }

.cf, .cb { position:absolute; width:100%; height:100%; border-radius:20px; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.cb { background: linear-gradient(145deg, #fdf0f8 0%, #efe8ff 100%); border: 2px solid #e8c6f0; }
.cb-inner { width:82%; height:84%; border-radius:14px; border: 1.5px solid #ddb6ea; background: linear-gradient(135deg, #fff5fb 0%, #f5eeff 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
.cf { transform: rotateY(180deg); background: linear-gradient(145deg, #ede8ff 0%, #fce4f0 100%); border: 2px solid #c9b8f5; }
.cf-inner { width:82%; height:84%; border-radius:14px; border: 1.5px solid #bbaef0; background: linear-gradient(135deg, #f5f0ff 0%, #fff0f8 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
.cf-letter { font-size:30px; font-weight:500; color:#4a3fa0; line-height:1; }
.cf-sub { font-size:10px; color:#8b7dd4; }

.hint { font-size:12px; color:#7060c0; margin-bottom:1rem; }

.reselect-btn {
  display: none;
  margin: 0 auto 1.4rem;
  background: transparent;
  border: 1.5px solid #d0bef5;
  color: #7060c0;
  font-size: 12px;
  padding: 7px 20px;
  border-radius: 24px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.18s;
}
.reselect-btn:hover { background: #ede8ff; }
.reselect-btn.visible { display: inline-block; }

.result-box { display:none; background: linear-gradient(145deg, #fdf0fb 0%, #ece6ff 100%); border: 1.5px solid #ddc8f5; border-radius:22px; padding:1.4rem 1.3rem 1.2rem; max-width:460px; margin:0 auto; text-align:left; animation: fadeUp 0.5s ease; }
.result-box.show { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.res-tag { font-size:11px; font-weight:500; color:#c2527a; letter-spacing:0.07em; text-transform:uppercase; margin-bottom:6px; }
.res-title { font-size:15px; font-weight:500; color:#322b85; margin-bottom:12px; line-height:1.5; }
.res-body { font-size:13px; color:#4a3fa0; line-height:1.85; margin-bottom:14px; }
.res-body p { margin-bottom:8px; }
.res-tip { background:#fff; border:1.5px solid #d0c0f5; border-radius:14px; padding:10px 14px; font-size:13px; font-weight:500; color:#322b85; margin-bottom:14px; line-height:1.6; }
.res-cta { font-size:12px; color:#7060c0; line-height:1.8; border-top:1px solid #d8c8f0; padding-top:12px; margin-bottom:12px; }
.res-link { display:inline-block; background:linear-gradient(120deg,#6a5cd4,#c25090); color:#fff; font-size:13px; font-weight:500; padding:9px 22px; border-radius:24px; text-decoration:none; margin-right:8px; }
.reset-btn { display:inline-block; background:transparent; border:1.5px solid #cbbdf0; color:#7060c0; font-size:12px; padding:7px 16px; border-radius:24px; cursor:pointer; }
.reset-btn:hover { background:#ede8ff; }
</style>

<script>
const R = {
  A:{title:"今天的你，值得更溫柔地對待自己",body:"明天的你，容易有點不安或不滿足。可能會覺得「好像還不夠好」、「哪裡差一點」。\n\n有時候不是事情真的不好，而是你對自己要求比較高，或容易比較。也有可能在錢、工作、外在狀態上，特別在意別人的眼光。",tip:"你其實不差，只是對自己太嚴格了。"},
  B:{title:"明天是有「往前走」能量的一天",body:"你會開始想未來、想改變，甚至有行動的衝動。也可能出現一些機會，像是新想法、新方向，或有人找你合作。\n\n重點不是等，而是你願不願意踏出去。",tip:"只要願意跨出去，事情會開始有進展。"},
  C:{title:"先動一小步，比一直想完美更有用",body:"明天比較容易想很多、卡住。會有點焦慮，或覺得自己被困住，不知道怎麼做。\n\n但其實很多「卡」不是現實造成的，而是你腦中一直在想最壞的情況。你越想，就越不敢動。",tip:"有些限制，其實是你自己設下的，只要你願意動，狀況會比你想的順很多^^"}
};
let done = false;

function pick(k) {
  if (done) return;
  done = true;
  document.getElementById('c'+k).classList.add('flipped');
  ['A','B','C'].forEach(x => {
    document.getElementById('c'+x).classList.add('done');
    if (x !== k) document.getElementById('c'+x).classList.add('faded');
  });
  document.getElementById('hintText').textContent = '牌面揭曉 ✨';
  document.getElementById('reselectBtn').classList.add('visible');
  setTimeout(() => showResult(k), 680);
}

function showResult(k) {
  const r = R[k];
  const paras = r.body.split('\n\n').map(p => '<p>'+p+'</p>').join('');
  const box = document.getElementById('resultBox');
  box.innerHTML = `
    <div class="res-tag">你選了 ${k} 牌</div>
    <div class="res-title">${r.title}</div>
    <div class="res-body">${paras}</div>
    <div class="res-tip">✦ Mita 小建議：${r.tip}</div>
    <div class="res-cta">如果你有選到某一組，應該多少有對應到你現在的狀態。<br>如果你最近剛好有一件很在意的事，或一直在想要不要做某個決定，把它看清楚一點，其實會差很多喔</div>
    <a class="res-link" href="https://lin.ee/skAYHmu" target="_blank">找 Mita 聊聊</a>
    <button class="reset-btn" onclick="resetAll()">再抽一次</button>
  `;
  box.classList.add('show');
}

function reselect() {
  done = false;
  ['A','B','C'].forEach(k => {
    const c = document.getElementById('c'+k);
    c.classList.remove('flipped','faded','done');
  });
  document.getElementById('reselectBtn').classList.remove('visible');
  const rb = document.getElementById('resultBox');
  rb.classList.remove('show');
  rb.innerHTML = '';
  document.getElementById('hintText').textContent = '閉上眼睛深呼吸，感受哪張牌在呼喚你';
}

function resetAll() {
  reselect();
}
</script>
