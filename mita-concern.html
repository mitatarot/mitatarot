<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>米塔塔羅 × 大眾占卜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --pur:       #7b6ab0;
  --pur-d:     #5a4d96;
  --pur-m:     #9e90c8;
  --pur-l:     #d2caec;
  --pur-pale:  #edeaf8;
  --blush:     #dfa8b4;
  --blush-d:   #c08898;
  --blush-l:   #f5e2e6;
  --card-bg:   #e8e2f6;
  --text:      #574868;
  --soft:      #9a8cb0;
  --white:     rgba(255,255,255,.9);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100vh;
  background:
    radial-gradient(ellipse 150% 70% at 10% 5%,  rgba(196,184,236,.4)  0%,transparent 52%),
    radial-gradient(ellipse 130% 80% at 90% 92%,  rgba(223,168,180,.32) 0%,transparent 52%),
    radial-gradient(ellipse 80%  55% at 55% 48%,  rgba(208,198,238,.24) 0%,transparent 50%),
    linear-gradient(168deg,#ece6f8 0%,#e4ddf5 30%,#ecdde8 65%,#f0e8f2 100%);
  font-family:"Noto Serif TC",serif;
  color:var(--text);overflow-x:hidden;
}
#bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:22px 15px 60px}

/* ── 大白卡 ── */
.card-wrap{
  background:rgba(255,255,255,.84);
  border-radius:28px;
  padding:26px 20px 30px;
  box-shadow:0 8px 44px rgba(90,76,150,.13);
  border:1px solid rgba(255,255,255,.82);
  backdrop-filter:blur(16px);
}

/* ── 品牌行：大 Logo 無框融合 ── */
.brand-row{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;
}
.brand-logo{
  flex-shrink:0;
  width:96px;height:96px;
  border-radius:50%;overflow:hidden;
  mix-blend-mode:multiply;
  opacity:.97;
}
.brand-logo img{width:100%;height:100%;object-fit:cover;display:block}

.brand-text{}
.brand-en{
  font-family:"Cormorant Garamond",serif;
  font-style:italic;font-size:13.5px;
  color:var(--pur);letter-spacing:.08em;margin-bottom:3px;
}
.brand-zh{font-size:10px;color:var(--soft);letter-spacing:.24em;margin-bottom:7px}
.brand-q{font-size:15.5px;font-weight:600;color:var(--text);line-height:1.52;letter-spacing:.02em}

/* 副文 */
.sub-row{
  text-align:center;font-size:12px;color:var(--soft);
  line-height:1.9;letter-spacing:.06em;margin-bottom:24px;
}

/* ── 三張牌 ── */
.tarot-row{display:flex;gap:11px;justify-content:center;margin-bottom:10px}

.tarot{
  flex:1;max-width:114px;aspect-ratio:4/7;
  background:var(--card-bg);
  border-radius:18px;
  border:1.5px solid rgba(255,255,255,.92);
  box-shadow:0 6px 24px rgba(90,76,150,.18),inset 0 1.5px 0 rgba(255,255,255,.7);
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:12px 6px 12px;
  position:relative;overflow:hidden;
  transition:transform .4s cubic-bezier(.34,1.5,.64,1),box-shadow .4s ease;
  -webkit-user-select:none;user-select:none;
}
.tarot::before{
  content:"";position:absolute;top:0;left:0;right:0;height:42%;
  background:linear-gradient(180deg,rgba(255,255,255,.5) 0%,transparent 100%);
  border-radius:18px 18px 0 0;pointer-events:none;
}
.tarot::after{
  content:"";position:absolute;inset:0;border-radius:18px;
  border:1px solid rgba(123,106,176,.2);pointer-events:none;
}
.tarot:hover{transform:translateY(-10px) scale(1.03);box-shadow:0 18px 40px rgba(90,76,150,.3)}
.tarot:active{transform:translateY(-3px) scale(.97)}

/* 牌背：純淨，無圖案 */
.card-back{
  flex:1;width:100%;display:flex;align-items:center;justify-content:center;
  border-radius:10px;
  background:linear-gradient(158deg,rgba(255,255,255,.3) 0%,rgba(206,194,238,.18) 52%,rgba(255,255,255,.08) 100%);
  height:100%;
}
.moon-svg{
  width:56px;height:56px;
  filter:drop-shadow(0 4px 12px rgba(123,106,176,.38));
  animation:moonFloat 4s ease-in-out infinite;
}
@keyframes moonFloat{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  50%{transform:translateY(-5px) rotate(2deg)}
}

/* 直排文字 */
.v-label{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-size:13.5px;font-weight:500;
  color:var(--text);letter-spacing:.3em;padding:8px 0;
}
.tarot-foot{display:flex;flex-direction:column;align-items:center;gap:2px}
.tarot-en{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;color:var(--pur);letter-spacing:.1em}
.tarot-tap{font-size:9px;color:var(--soft);letter-spacing:.05em}

.tarot-names{
  display:flex;justify-content:space-around;
  font-size:11px;color:var(--soft);letter-spacing:.12em;padding:0 4px;
}

/* ───── 結果彈窗 ───── */
.overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(174,160,212,.46);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  overflow-y:auto;padding:22px 14px 48px;
  align-items:flex-start;justify-content:center;
}
.overlay.on{display:flex}

.result-wrap{
  background:linear-gradient(162deg,#faf7ff 0%,#f0eafa 38%,#ece4f5 100%);
  border-radius:28px;padding:28px 22px 32px;
  max-width:394px;width:100%;
  box-shadow:0 22px 62px rgba(80,64,140,.2);
  border:1px solid rgba(255,255,255,.92);
  margin:auto;position:relative;
  animation:pop .46s cubic-bezier(.34,1.28,.64,1);
}
@keyframes pop{from{transform:translateY(44px) scale(.93);opacity:0}to{transform:none;opacity:1}}

.r-top{
  display:flex;align-items:center;gap:14px;
  padding-bottom:14px;
  border-bottom:1px solid rgba(155,140,185,.22);
  margin-bottom:18px;
}
.r-logo{
  width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;
  mix-blend-mode:multiply;opacity:.97;
}
.r-logo img{width:100%;height:100%;object-fit:cover;display:block}
.r-opt{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:38px;color:var(--pur);line-height:1}
.r-opt-label{font-size:11px;color:var(--soft);letter-spacing:.17em;margin-top:2px}

.r-title{font-size:15px;font-weight:600;color:var(--pur-d);margin-bottom:10px;letter-spacing:.04em}
.r-body{font-size:14px;line-height:2.12;color:var(--text);letter-spacing:.04em;margin-bottom:18px;white-space:pre-line}

.r-energy{
  background:linear-gradient(135deg,rgba(123,106,176,.13) 0%,rgba(223,168,180,.16) 100%);
  border-radius:14px;padding:16px 18px;
  border:1px solid rgba(158,144,200,.26);
  margin-bottom:14px;
}
.r-energy-title{font-size:13px;font-weight:600;color:var(--pur);margin-bottom:4px}
.r-energy-name{font-size:13.5px;font-weight:600;color:var(--pur-d);margin-bottom:6px;letter-spacing:.06em}
.r-energy-d{font-size:13px;color:var(--soft);line-height:1.9}

.r-extra{
  background:linear-gradient(135deg,rgba(223,168,180,.16) 0%,rgba(123,106,176,.1) 100%);
  border-radius:14px;padding:14px 16px;
  border:1px solid rgba(158,144,200,.22);
  margin-bottom:16px;
  font-size:13px;color:var(--text);line-height:1.95;letter-spacing:.03em;
}

.r-divider{text-align:center;color:var(--pur-m);opacity:.45;font-size:15px;letter-spacing:8px;margin:16px 0}

.r-cta{
  background:linear-gradient(135deg,rgba(208,196,240,.28) 0%,rgba(223,168,180,.2) 100%);
  border-radius:16px;padding:16px;text-align:center;
  border:1px solid rgba(158,144,200,.26);margin-bottom:16px;
}
.r-cta-text{font-size:13px;color:var(--text);line-height:1.95;margin-bottom:13px;letter-spacing:.03em}
.r-cta-btn{
  display:inline-block;
  background:linear-gradient(135deg,var(--pur-d),var(--blush-d));
  color:#fff;border:none;border-radius:50px;
  padding:12px 30px;font-size:13.5px;
  font-family:"Noto Serif TC",serif;
  letter-spacing:.1em;cursor:pointer;text-decoration:none;
  box-shadow:0 5px 20px rgba(90,76,150,.36);
  transition:transform .25s,box-shadow .25s;
}
.r-cta-btn:hover{transform:translateY(-2px);box-shadow:0 9px 28px rgba(90,76,150,.46)}
.r-back{
  display:block;width:100%;background:rgba(158,144,200,.14);
  border:1.5px solid rgba(158,144,200,.34);border-radius:50px;padding:12px;
  font-size:13px;font-family:"Noto Serif TC",serif;
  color:var(--soft);cursor:pointer;letter-spacing:.15em;transition:background .25s,color .25s;
}
.r-back:hover{background:rgba(158,144,200,.28);color:var(--text)}

.sp{position:absolute;font-size:11px;opacity:.4;pointer-events:none;animation:tw 3s infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.65;transform:scale(1.4)}}
</style>
</head>

};

function openCard(k){
  const d=DATA[k];
  document.getElementById("rOpt").textContent=k;
  document.getElementById("rTitle").textContent=d.title;
  document.getElementById("rBody").textContent=d.body;
  document.getElementById("rEnergy").innerHTML=
    '<div class="r-energy-title">'+d.ename+'</div>'+
    '<div class="r-energy-d">'+d.ed+'</div>';
  document.getElementById("rExtra").textContent=d.extra;
  const ov=document.getElementById("ov");
  ov.classList.add("on");ov.scrollTop=0;
}
function closeCard(){document.getElementById("ov").classList.remove("on");}

const cv=document.getElementById("bg"),ctx=cv.getContext("2d");
let W,H,pts=[];
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
rsz();addEventListener("resize",rsz);
const syms=["♡","✦","✧","·","⋆","✿","❀","✩","☽"];
const cols=["rgba(123,106,176,","rgba(160,144,200,","rgba(208,196,236,","rgba(223,168,180,","rgba(196,180,228,"];
for(let i=0;i<55;i++){
  pts.push({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.3,vy:-Math.random()*.42-.13,
    sz:Math.random()*9+5,
    sym:syms[Math.floor(Math.random()*syms.length)],
    col:cols[Math.floor(Math.random()*cols.length)],
    a:Math.random()*.25+.07,da:(Math.random()-.5)*.005
  });
}
function frame(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.a+=p.da;
    if(p.a>.36||p.a<.05)p.da*=-1;
    if(p.y<-18){p.y=H+10;p.x=Math.random()*W;}
    if(p.x<-18)p.x=W+10;if(p.x>W+18)p.x=-10;
    ctx.font=p.sz+"px serif";
    ctx.fillStyle=p.col+p.a+")";
    ctx.fillText(p.sym,p.x,p.y);
  });
  requestAnimationFrame(frame);
}
frame();
</script>

<style>
.bubble{
  position:fixed;pointer-events:none;z-index:9999;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,
    rgba(255,255,255,.85) 0%,
    rgba(196,180,240,.55) 40%,
    rgba(160,140,220,.25) 70%,
    transparent 100%);
  border:1px solid rgba(196,180,240,.5);
  animation:bubblePop var(--dur,0.8s) ease-out forwards;
}
@keyframes bubblePop{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:.9}
  60% {opacity:.7}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}
</style>
<script>
(function(){
  let last=0;
  document.addEventListener('mousemove',function(e){
    const now=Date.now();
    if(now-last<55)return;
    last=now;
    const b=document.createElement('div');
    b.className='bubble';
    const sz=Math.random()*18+8;
    const dur=(Math.random()*.5+.55).toFixed(2)+'s';
    b.style.cssText=
      'left:'+e.clientX+'px;top:'+e.clientY+'px;'+
      'width:'+sz+'px;height:'+sz+'px;'+
      '--dur:'+dur;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),(parseFloat(dur)*1000)+100);
  });
})();
</script>
